<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairly - Lead Allocation Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #e9d5ff 0%, #faf5ff 50%, #dbeafe 100%);
        }
        .font-logo {
            font-family: 'Bagel Fat One', cursive;
        }
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 1.5rem; /* 2xl */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 1.5rem;
        }
         .glass-sidebar {
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
         }
         .glass-header {
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
         }
         .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="app" class="flex h-screen"></div>
    <div id="modal-container"></div>
    <div id="booking-widget-container"></div>

    <script type="module">
        // --- MOCK DATA & STATE MANAGEMENT ---
        let globalState = {
            teams: [
                { id: 1, name: 'Sales Team A (Large Enterprise)', members: [
                    { id: 101, name: 'Alice Johnson', email: 'alice@example.com', weight: 8, workingHours: { start: '09:00', end: '17:30' } }, 
                    { id: 102, name: 'Bob Williams', email: 'bob@example.com', weight: 5, workingHours: { start: '09:00', end: '17:30' } }
                ]},
                { id: 2, name: 'Sales Team B (Mid-Market)', members: [
                    { id: 201, name: 'Charlie Brown', email: 'charlie@example.com', weight: 7, workingHours: { start: '08:30', end: '17:00' } }
                ]},
                { id: 3, name: 'Support Specialists', members: [
                    {id: 301, name: 'Diana Prince', email: 'diana@example.com', weight: 10, workingHours: { start: '09:00', end: '17:00' } }
                ]},
            ],
            eventTypes: [
                { id: 1, name: '30-Minute Product Demo', duration: 30, rules: [{ teamId: 1, conditions: [{ field: 'companySize', condition: 'gt', value: 500 }] }, { teamId: 2, conditions: [{ field: 'companySize', condition: 'lte', value: 500 }] }], catchAllTeamId: 2 },
            ],
            mockCrm: [
                { email: 'existing.customer@example.com', ownerId: 102, name: 'Existing Customer' },
                { email: 'vip.client@example.com', ownerId: 101, name: 'VIP Client' },
            ],
            allocationLog: [
                { id: 1, leadName: 'John Doe', leadEmail: 'john.doe@acmetech.com', rationale: "Rule Match: Company Size > 500", assignedToId: 101, timestamp: new Date(Date.now() - 3600000), status: 'Booked', meetingTime: new Date('2025-10-02T13:00:00') },
                { id: 2, leadName: 'Jane Smith', leadEmail: 'jane.smith@globalbank.com', rationale: "Catch-all Assignment", assignedToId: 201, timestamp: new Date(Date.now() - 7200000), status: 'Meeting Held, Qualified' },
                { id: 5, leadName: 'Upcoming Demo', leadEmail: 'future@demo.com', rationale: "Rule Match: Company Size > 500", assignedToId: 101, timestamp: new Date(Date.now() - 300000), status: 'Booked', meetingTime: new Date('2025-10-03T10:00:00') },
                { id: 6, leadName: 'Future Prospect', leadEmail: 'prospect@new.co', rationale: "Catch-all Assignment", assignedToId: 101, timestamp: new Date('2025-10-02T10:00:00'), status: 'Booked', meetingTime: new Date('2025-10-02T15:00:00') }
            ],
            mockCalendarEvents: [
                { memberId: 102, title: 'Out of Office', allDay: true, date: new Date('2025-10-02'), gcalStatus: 'busy' },
                { memberId: 101, title: 'Internal Sync', start: new Date('2025-10-02T11:00:00'), end: new Date('2025-10-02T12:00:00'), gcalStatus: 'busy'},
                { memberId: 101, title: 'Focus Time', start: new Date('2025-10-02T14:00:00'), end: new Date('2025-10-02T15:00:00'), gcalStatus: 'free'},
                { memberId: 201, title: 'Dentist Appointment', start: new Date('2025-10-02T14:00:00'), end: new Date('2025-10-02T15:00:00'), gcalStatus: 'busy'},
            ]
        };
        
        let appState = {
            currentView: 'admin',
            loggedInRepId: 101,
            currentDate: new Date('2025-10-02T13:15:00+01:00') // Updated to 1:15 PM
        };

        const app = document.getElementById('app');
        const bookingWidgetContainer = document.getElementById('booking-widget-container');
        
        function render() {
            app.innerHTML = '';
            app.appendChild(Sidebar());
            const mainWrapper = document.createElement('div');
            mainWrapper.className = "flex-1 flex flex-col h-screen overflow-y-auto";
            mainWrapper.appendChild(AppHeader());
            
            const content = document.createElement('main');
            content.className = "flex-1 p-6 lg:p-8";

            if (appState.currentView === 'admin') {
                content.appendChild(AdminDashboard());
            } else {
                content.appendChild(RepDashboard());
            }
            mainWrapper.appendChild(content);
            app.appendChild(mainWrapper);
        }

        function Sidebar() {
            const el = document.createElement('div');
            el.className = 'w-64 glass-sidebar border-r border-slate-200/50 flex-shrink-0 flex flex-col';
            const isAdminView = appState.currentView === 'admin';
            
            el.innerHTML = `
                <div class="p-4 border-b border-slate-200/50">
                    <div class="flex items-center gap-3">
                         <div class="w-10 h-10 bg-violet-500 rounded-lg flex items-center justify-center text-white font-logo text-2xl shadow-lg shadow-violet-500/30">F</div>
                         <h1 class="text-2xl font-bold text-slate-800 font-logo">Fairly</h1>
                    </div>
                </div>
                <nav class="flex-1 p-4 space-y-2">
                    <a href="#" id="admin-view-btn" class="flex items-center gap-3 px-3 py-2 rounded-lg transition ${isAdminView ? 'bg-violet-500/20 text-violet-700' : 'text-slate-600 hover:bg-slate-500/10'}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM4 12a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM4 18a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z"></path></svg>
                        <span class="font-semibold">Admin Dashboard</span>
                    </a>
                     <a href="#" id="rep-view-btn" class="flex items-center gap-3 px-3 py-2 rounded-lg transition ${!isAdminView ? 'bg-violet-500/20 text-violet-700' : 'text-slate-600 hover:bg-slate-500/10'}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <span class="font-semibold">My Dashboard</span>
                    </a>
                </nav>
            `;
            el.querySelector('#admin-view-btn').onclick = (e) => { e.preventDefault(); appState.currentView = 'admin'; render(); };
            el.querySelector('#rep-view-btn').onclick = (e) => { e.preventDefault(); appState.currentView = 'rep'; render(); };
            return el;
        }

        function AppHeader() {
            const el = document.createElement('header');
            el.className = 'glass-header border-b border-slate-200/50 p-4 sticky top-0 z-10 flex items-center justify-between';
            const rep = globalState.teams.flatMap(t=>t.members).find(m => m.id === appState.loggedInRepId);
            const user = appState.currentView === 'admin' ? { name: 'Admin User', email: 'admin@example.com' } : rep;

            el.innerHTML = `
                <div class="relative w-full max-w-xs">
                     <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                     <input type="text" placeholder="Find anything..." class="bg-slate-100/80 border-transparent focus:ring-violet-500 focus:border-violet-500 rounded-lg w-full pl-10">
                </div>
                <div class="flex items-center gap-4">
                     <button class="text-slate-500 hover:text-slate-800"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg></button>
                     <div class="flex items-center gap-2">
                         <img src="https://placehold.co/32x32/E2E8F0/4A5568?text=${user.name.charAt(0)}" class="w-8 h-8 rounded-full" alt="User profile">
                         <div>
                             <p class="font-semibold text-sm text-slate-800">${user.name}</p>
                             <p class="text-xs text-slate-500">${user.email}</p>
                         </div>
                     </div>
                </div>
            `;
            return el;
        }

        function AdminDashboard() {
            const el = document.createElement('div');
            el.className = 'grid grid-cols-1 lg:grid-cols-3 gap-8';
            const mainCol = document.createElement('div');
            mainCol.className = 'lg:col-span-2 space-y-8';
            mainCol.appendChild(SimulationSection());
            mainCol.appendChild(AllocationLogSection());
            mainCol.appendChild(WorkingHoursSection());
            mainCol.appendChild(RoutingSection());

            const rightCol = document.createElement('div');
            rightCol.className = 'lg:col-span-1 space-y-8';
            rightCol.appendChild(LiveAllocationQueueSection());
            
            el.appendChild(mainCol);
            el.appendChild(rightCol);
            return el;
        }

        function RepDashboard() {
            const rep = globalState.teams.flatMap(t => t.members).find(m => m.id === appState.loggedInRepId);
            const myAllocations = globalState.allocationLog.filter(log => log.assignedToId === appState.loggedInRepId).sort((a, b) => b.timestamp - a.timestamp);
            
            const el = document.createElement('div');
            el.className = 'grid grid-cols-1 lg:grid-cols-3 gap-8';
            const mainCol = document.createElement('div');
            mainCol.className = 'lg:col-span-2 space-y-8';
            mainCol.appendChild(RepWeeklyScheduleCard(rep, myAllocations));
            mainCol.appendChild(RepMyAllocationsCard(myAllocations));
            
            const rightCol = document.createElement('div');
            rightCol.className = 'lg:col-span-1 space-y-8';
            rightCol.appendChild(RepAvailabilityCard(rep));
            rightCol.appendChild(RepSmartLinkCard(rep));

            el.appendChild(mainCol);
            el.appendChild(rightCol);
            return el;
        }
        
        function SimulationSection() { const el = document.createElement('div'); el.className = 'glass-card'; el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-2">🚀 Live Pop-up Simulation</h2><p class="text-sm text-slate-500 mb-6">Test the booking flow to see the allocation queue in action.</p><div class="bg-slate-50/50 p-8 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-slate-300/50"><h3 class="text-2xl font-bold text-slate-800">Ready to see our product in action?</h3><p class="text-slate-600 mt-2 mb-6">Schedule a free, no-obligation demo with our team.</p><button id="start-simulation-btn" class="bg-violet-500 text-white px-8 py-3 rounded-xl font-semibold hover:bg-violet-600 transition shadow-lg shadow-violet-500/20 text-lg">Book a Demo Call</button></div>`; el.querySelector('#start-simulation-btn').onclick = () => window.showBookingWidget(1); return el; }
        function LiveAllocationQueueSection() { const el = document.createElement('div'); el.className = 'glass-card'; let teamQueuesHtml = globalState.teams.map(team => { const lastAssignedIndex = parseInt(localStorage.getItem(`lastIndex_${team.id}`) || '-1'); let membersInOrder = [...team.members]; if (lastAssignedIndex !== -1 && membersInOrder.length > 1) { const nextIndex = (lastAssignedIndex + 1) % membersInOrder.length; membersInOrder = [...membersInOrder.slice(nextIndex), ...membersInOrder.slice(0, nextIndex)]; } return `<div class="p-2"><h3 class="font-semibold text-slate-700">${team.name}</h3><div class="mt-4 space-y-2">${membersInOrder.map((member, index) => { const currentStatus = getRepStatus(member.id); const isNextUp = index === 0 && currentStatus === 'Available'; const statusInfo = getStatusInfo(currentStatus); const leadCount = globalState.allocationLog.filter(l => l.assignedToId === member.id).length; return `<div class="flex justify-between items-center text-sm p-3 rounded-xl ${isNextUp ? 'bg-violet-500/10' : 'bg-slate-500/10'}"><div><p class="font-medium text-slate-800 flex items-center">${member.name} ${isNextUp ? '<span class="ml-2 px-2 py-0.5 text-xs font-semibold rounded-full bg-violet-500 text-white">Next Up ➡️</span>' : ''}</p><p class="text-slate-500 text-xs">Leads This Week: ${leadCount}</p></div><div class="text-right"><span class="px-2 py-1 text-xs font-medium rounded-full ${statusInfo.color}">${statusInfo.text}</span></div></div>` }).join('') || '<p class="text-sm text-slate-400">No members in this team.</p>'}</div></div>` }).join('<hr class="my-4 border-slate-200/50">'); el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-4">📊 Live Allocation Queue</h2><div class="space-y-4">${teamQueuesHtml}</div>`; return el; }
        function AllocationLogSection() { const el = document.createElement('div'); el.className = 'glass-card'; const logHtml = `<div class="h-96 overflow-y-auto"><table class="min-w-full"><thead><tr><th class="px-4 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Lead</th><th class="px-4 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Routing Rationale</th><th class="px-4 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Assigned To</th><th class="px-4 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Status & Outcome</th></tr></thead><tbody class="divide-y divide-slate-200/50">${globalState.allocationLog.map(log => { const rep = globalState.teams.flatMap(t => t.members).find(m => m.id === log.assignedToId); const statusColor = log.status.includes('Spam') || log.status.includes('No-show') ? 'bg-red-100 text-red-800' : log.status.includes('Qualified') ? 'bg-green-100 text-green-800' : 'bg-slate-100 text-slate-800'; return `<tr><td class="px-4 py-3 whitespace-nowrap"><div class="text-sm font-medium text-slate-900">${log.leadName}</div><div class="text-sm text-slate-500">${log.leadEmail}</div></td><td class="px-4 py-3 text-sm text-slate-600 max-w-xs truncate">${log.rationale}</td><td class="px-4 py-3 whitespace-nowrap text-sm text-slate-600">${rep ? rep.name : 'N/A'}</td><td class="px-4 py-3 whitespace-nowrap text-sm"><select data-log-id="${log.id}" class="status-select bg-transparent font-semibold rounded-md border-0 focus:ring-2 focus:ring-violet-500 text-sm ${statusColor.replace('bg-', 'text-')}"><option ${log.status === 'Booked' ? 'selected' : ''}>🗓️ Booked</option><option ${log.status === 'Meeting Held, Qualified' ? 'selected' : ''}>✅ Qualified</option><option ${log.status === 'Meeting Held, Not a Fit' ? 'selected' : ''}>❌ Not a Fit</option><option ${log.status === 'No-show' ? 'selected' : ''}>👻 No-show</option><option ${log.status === 'Spam/Invalid' ? 'selected' : ''}>🗑️ Spam</option></select></td></tr>`; }).join('')}</tbody></table></div>`; el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-4">📋 Allocation Log</h2> ${logHtml}`; el.querySelectorAll('.status-select').forEach(select => { select.onchange = (e) => { const logEntry = globalState.allocationLog.find(l => l.id === parseInt(e.target.dataset.logId)); if (logEntry) { logEntry.status = e.target.value; render(); } } }); return el; }
        
        function WorkingHoursSection() {
            const el = document.createElement('div');
            el.className = 'glass-card';
            let membersHtml = `<div class="space-y-4">`;
            globalState.teams.flatMap(t => t.members).forEach(rep => {
                membersHtml += `
                    <div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4 p-2 border-b border-slate-200/50">
                        <p class="font-semibold text-slate-800">${rep.name}</p>
                        <div class="flex items-center gap-2 col-span-2">
                            <input type="time" data-member-id="${rep.id}" data-type="start" value="${rep.workingHours.start}" class="working-hours-input bg-slate-100/80 border-transparent focus:ring-violet-500 focus:border-violet-500 rounded-lg w-full px-3 py-2 text-sm">
                            <span class="text-slate-500">-</span>
                            <input type="time" data-member-id="${rep.id}" data-type="end" value="${rep.workingHours.end}" class="working-hours-input bg-slate-100/80 border-transparent focus:ring-violet-500 focus:border-violet-500 rounded-lg w-full px-3 py-2 text-sm">
                        </div>
                    </div>
                `;
            });
            membersHtml += `</div>
                <div class="flex justify-end mt-6">
                    <button id="save-hours-btn" class="bg-violet-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-violet-600 transition shadow-lg shadow-violet-500/20">Save Changes</button>
                </div>
            `;
            el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-4">⏰ Team Working Hours</h2>${membersHtml}`;
            
            el.querySelector('#save-hours-btn').onclick = () => {
                el.querySelectorAll('.working-hours-input').forEach(input => {
                    const memberId = parseInt(input.dataset.memberId);
                    const type = input.dataset.type;
                    const member = globalState.teams.flatMap(t => t.members).find(m => m.id === memberId);
                    if(member) {
                        member.workingHours[type] = input.value;
                    }
                });
                const btn = el.querySelector('#save-hours-btn');
                btn.textContent = 'Saved!';
                btn.classList.add('bg-green-500', 'hover:bg-green-600');
                btn.classList.remove('bg-violet-500', 'hover:bg-violet-600');
                setTimeout(() => {
                    btn.textContent = 'Save Changes';
                    btn.classList.remove('bg-green-500', 'hover:bg-green-600');
                    btn.classList.add('bg-violet-500', 'hover:bg-violet-600');
                    render();
                }, 1500);
            };

            return el;
        }

        function RoutingSection() { const el = document.createElement('div'); el.className = 'glass-card'; let eventsHtml = ''; globalState.eventTypes.forEach(event => { let rulesHtml = event.rules.map(ruleGroup => { const team = globalState.teams.find(t => t.id === ruleGroup.teamId); const conditionsHtml = ruleGroup.conditions.map(cond => { const conditionText = { 'gt': '>', 'lte': '≤', 'eq': '=' }[cond.condition]; const fieldText = { 'companySize': 'Company Size'}[cond.field] || cond.field; return `<span class="font-normal">${fieldText} ${conditionText} ${cond.value}</span>`; }).join('<span class="font-bold text-slate-500 mx-2">AND</span>'); return `<div class="p-3 bg-slate-500/10 rounded-xl"><p class="text-sm text-slate-600"><span class="font-semibold text-slate-500">IF</span> ${conditionsHtml} <span class="font-semibold text-slate-500">THEN</span> route to <span class="font-medium text-violet-600">${team ? team.name : 'N/A'}</span></p></div>`; }).join('<div class="text-center my-2 text-slate-400 font-semibold text-sm">OR</div>'); const catchAllTeam = globalState.teams.find(t => t.id === event.catchAllTeamId); const catchAllHtml = `<div class="mt-3 p-3 bg-violet-500/10 border border-violet-500/20 rounded-xl"><p class="text-sm text-violet-700"><span class="font-semibold text-violet-800">Catch-all:</span> If no rules match, route to <span class="font-medium text-violet-600">${catchAllTeam ? catchAllTeam.name : 'None'}</span>.</p></div>`; if (rulesHtml === '') { rulesHtml = `<p class="text-sm text-slate-400 text-center py-4">No specific routing rules for this event.</p>`; } eventsHtml += `<div class="border border-slate-200/50 p-4 rounded-2xl"><h3 class="font-semibold text-slate-800">${event.name}</h3><div class="mt-4">${rulesHtml}</div>${catchAllHtml}</div>`; }); el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-4">🧠 Routing Rules</h2><div class="space-y-6">${eventsHtml}</div>`; return el; }

        function RepAvailabilityCard(rep) {
            const el = document.createElement('div');
            el.className = 'glass-card';
            const repStatus = getRepStatus(rep.id);
            const { text: statusText, bgColor, textColor } = getStatusInfo(repStatus);

            el.innerHTML = `
                <h2 class="text-xl font-semibold text-slate-800 mb-4">✨ My Status</h2>
                <div class="p-4 rounded-xl ${bgColor}">
                    <p class="font-medium ${textColor} text-center text-lg">${statusText}</p>
                </div>
                <div class="mt-4 p-4 bg-violet-500/10 border border-violet-500/20 rounded-xl">
                    <div class="flex">
                        <div class="flex-shrink-0"><span class="text-xl">🗓️</span></div>
                        <div class="ml-3">
                            <h3 class="text-sm font-medium text-violet-800">How to manage your availability</h3>
                            <div class="mt-2 text-sm text-violet-700">
                                <p>To block out time, add an event to Google Calendar and set its status to "Busy". Events marked "Free" (like focus time) will be ignored.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            return el;
        }
        function RepSmartLinkCard(rep) { const el = document.createElement('div'); el.className = 'glass-card'; const repLink = `https://your-platform.com/${rep.name.split(' ').join('-').toLowerCase()}`; el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-2">🔗 My Smart Booking Link</h2><p class="text-sm text-slate-500 mb-4">Use this link for intelligent scheduling.</p><div class="flex items-center gap-2"><input id="smart-link-input" type="text" readonly value="${repLink}" class="bg-slate-100/80 border-transparent focus:ring-violet-500 focus:border-violet-500 rounded-lg w-full px-3 py-2 text-sm"><button id="copy-link-btn" class="bg-violet-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-violet-600 transition shadow-lg shadow-violet-500/20 text-sm">📋 Copy</button></div><p id="copy-feedback" class="text-xs text-green-600 mt-2 h-4"></p>`; el.querySelector('#copy-link-btn').onclick = () => { const input = document.getElementById('smart-link-input'); input.select(); document.execCommand('copy'); const feedback = document.getElementById('copy-feedback'); feedback.textContent = 'Copied to clipboard!'; setTimeout(() => feedback.textContent = '', 2000); }; return el; }
        
        function RepWeeklyScheduleCard(rep, myAllocations) {
            const el = document.createElement('div');
            el.className = 'glass-card';
            const today = appState.currentDate;
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1));

            let weekDays = Array.from({length: 5}).map((_, i) => {
                const day = new Date(startOfWeek);
                day.setDate(startOfWeek.getDate() + i);
                return day;
            });

            const startHour = 8;
            const endHour = 18;
            const totalHours = endHour - startHour;

            let calendarHtml = `<div class="grid grid-cols-5 gap-px bg-slate-200/50 border border-slate-200/50 rounded-2xl overflow-hidden mt-4">`;

            weekDays.forEach(day => {
                const isToday = day.toDateString() === today.toDateString();
                const allBlocks = [];
                const { start: startWork, end: endWork } = rep.workingHours;
                const [startWorkHour, startWorkMinute] = startWork.split(':').map(Number);
                const [endWorkHour, endWorkMinute] = endWork.split(':').map(Number);

                allBlocks.push({ start: new Date(day).setHours(0, 0, 0, 0), end: new Date(day).setHours(startWorkHour, startWorkMinute, 0, 0), type: 'blocked' });
                allBlocks.push({ start: new Date(day).setHours(endWorkHour, endWorkMinute, 0, 0), end: new Date(day).setHours(23, 59, 59, 999), type: 'blocked' });
                
                globalState.mockCalendarEvents
                    .filter(e => e.memberId === rep.id && !e.allDay && new Date(e.start).toDateString() === day.toDateString())
                    .forEach(event => allBlocks.push({ ...event, type: event.gcalStatus === 'free' ? 'available-with-event' : 'blocked' }));

                myAllocations
                    .filter(a => a.status === 'Booked' && new Date(a.meetingTime).toDateString() === day.toDateString())
                    .forEach(a => allBlocks.push({ title: a.leadName, start: a.meetingTime, end: new Date(a.meetingTime.getTime() + 30 * 60000), type: 'demo' }));

                calendarHtml += `<div class="bg-white/50">
                    <div class="p-2 border-b border-slate-200/50 text-center">
                        <p class="text-xs text-slate-500">${day.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()}</p>
                        <p class="font-semibold text-lg ${isToday ? 'text-violet-600' : 'text-slate-700'}">${day.getDate()}</p>
                    </div>
                    <div class="relative h-[400px]">`;
                
                allBlocks.forEach(block => {
                    const eventStart = new Date(block.start);
                    const eventEnd = new Date(block.end);
                    const clampedStart = new Date(Math.max(eventStart, new Date(day).setHours(startHour, 0, 0, 0)));
                    const clampedEnd = new Date(Math.min(eventEnd, new Date(day).setHours(endHour, 0, 0, 0)));
                    if (clampedEnd <= clampedStart) return;
                    const startMinutes = (clampedStart.getHours() - startHour) * 60 + clampedStart.getMinutes();
                    const endMinutes = (clampedEnd.getHours() - startHour) * 60 + clampedEnd.getMinutes();
                    const durationMinutes = endMinutes - startMinutes;
                    const top = (startMinutes / (totalHours * 60)) * 100;
                    const height = (durationMinutes / (totalHours * 60)) * 100;
                    
                    let styleClass = '';
                    let content = '';
                    switch(block.type) {
                        case 'demo':
                            styleClass = 'bg-blue-500/80 border-blue-500/90 text-white';
                            content = `<p class="font-semibold truncate">💻 ${block.title}</p>`;
                            break;
                        case 'blocked':
                            styleClass = `bg-yellow-400/80 ${block.title ? 'border-yellow-500/90 text-yellow-900' : 'border-transparent'}`;
                            content = block.title ? `<p class="font-semibold truncate">⛔ ${block.title}</p>`: '';
                            break;
                        case 'available-with-event':
                            styleClass = 'bg-green-500/20 border-green-500/80 text-green-900 border-dashed';
                            content = `<p class="font-semibold truncate">🧠 ${block.title}</p>`;
                            break;
                    }

                    if(top >= 0 && (top + height) <= 101) {
                         calendarHtml += `<div class="absolute w-full px-2 py-1 text-xs leading-tight rounded-lg border ${styleClass}" style="top: ${top}%; height: ${height}%; left: 2px; right: 2px; width: calc(100% - 4px);">${content}</div>`;
                    }
                });
                
                if (isToday) {
                    const minutesFromStart = (today.getHours() - startHour) * 60 + today.getMinutes();
                    const currentTimePosition = (minutesFromStart / (totalHours * 60)) * 100;
                    calendarHtml += `<div class="absolute w-full border-t-2 border-red-500" style="top: ${currentTimePosition}%;">
                        <div class="absolute -top-1.5 -left-1.5 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></div>
                    </div>`;
                }

                calendarHtml += `</div></div>`;
            });

            calendarHtml += '</div>';
            
            el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-4">🗓️ My Weekly Schedule</h2>${calendarHtml}`;
            return el;
        }

        function RepMyAllocationsCard(myAllocations) { const el = document.createElement('div'); el.className = 'glass-card'; const logHtml = `<div class="h-96 overflow-y-auto"><table class="min-w-full"><thead><tr><th class="px-4 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Lead</th><th class="px-4 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Rationale</th><th class="px-4 py-2 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Status</th></tr></thead><tbody class="divide-y divide-slate-200/50">${myAllocations.map(log => { const statusColor = log.status.includes('Spam') || log.status.includes('No-show') ? 'bg-red-100 text-red-800' : log.status.includes('Qualified') ? 'bg-green-100 text-green-800' : 'bg-slate-100 text-slate-800'; return `<tr><td class="px-4 py-3 whitespace-nowrap"><div class="text-sm font-medium text-slate-900">${log.leadName}</div><div class="text-sm text-slate-500">${log.leadEmail}</div></td><td class="px-4 py-3 text-sm text-slate-600 max-w-xs truncate">${log.rationale}</td><td class="px-4 py-3 whitespace-nowrap text-sm"><select data-log-id="${log.id}" class="status-select bg-transparent font-semibold rounded-md border-0 focus:ring-2 focus:ring-violet-500 text-sm ${statusColor.replace('bg-', 'text-')}"><option>🗓️ Booked</option><option>✅ Qualified</option><option>❌ Not a Fit</option><option>👻 No-show</option><option>🗑️ Spam</option></select></td></tr>`; }).join('')}</tbody></table></div>`; el.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 mb-4">📚 My Recent Allocations</h2> ${logHtml}`; return el; }

        // --- UTILITY & HELPER FUNCTIONS ---
        function getRepStatus(memberId) {
            const member = globalState.teams.flatMap(t => t.members).find(m => m.id === memberId);
            if (!member) return 'Unknown';
            const now = appState.currentDate;
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const isOoo = globalState.mockCalendarEvents.some(event => event.memberId === memberId && event.allDay && event.date.getTime() === today.getTime());
            if (isOoo) return 'Out of Office';
            const [startHour, startMinute] = member.workingHours.start.split(':').map(Number);
            const [endHour, endMinute] = member.workingHours.end.split(':').map(Number);
            const startTime = new Date(today.getTime()).setHours(startHour, startMinute, 0, 0);
            const endTime = new Date(today.getTime()).setHours(endHour, endMinute, 0, 0);
            if (now.getTime() < startTime || now.getTime() > endTime) return 'Outside Hours';
            const isInMeeting = globalState.mockCalendarEvents.some(event => 
                event.memberId === memberId && 
                !event.allDay && 
                event.gcalStatus !== 'free' && 
                now >= event.start && 
                now < event.end
            );
            if (isInMeeting) return 'In a Meeting';
            return 'Available';
        }
        
        function getStatusInfo(status) {
            const base = {
                'Available': { text: '✅ Available', color: 'bg-green-100 text-green-800', bgColor: 'bg-green-500/10', textColor: 'text-green-800' },
                'Out of Office': { text: '🌴 Out of Office', color: 'bg-red-100 text-red-800', bgColor: 'bg-red-500/10', textColor: 'text-red-800' },
                'In a Meeting': { text: '👨‍💻 In a Meeting', color: 'bg-yellow-100 text-yellow-800', bgColor: 'bg-yellow-500/10', textColor: 'text-yellow-800' },
                'Outside Hours': { text: '🌙 Outside Hours', color: 'bg-slate-200 text-slate-700', bgColor: 'bg-slate-500/10', textColor: 'text-slate-600' },
            };
            return base[status] || { text: '❓ Unknown', color: 'bg-slate-200 text-slate-700', bgColor: 'bg-slate-500/10', textColor: 'text-slate-600' };
        }
        
        window.showBookingWidget = () => alert("Simulation started.");
        
        window.onload = () => { render(); };
    </script>
</body>
